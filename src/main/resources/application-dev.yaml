spring:
  datasource:
    url: jdbc:postgresql://dev-db-host:5432/csa
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: front

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1sb2NhbC1kZXYtb25seS0yNTZiaXQhIQ==
  access-expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 8080

logging:
  level:
    root: INFO
    org.example.csa_backend: INFO

google:
  oauth:
    client-id: ""
