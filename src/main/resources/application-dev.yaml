spring:
  datasource:
    url: jdbc:postgresql://dev-db-host:5432/csa
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: front

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci1sb2NhbC1kZXYtb25seS0yNTZiaXQhIQ==
  access-expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 8080

logging:
  level:
    root: INFO
    org.example.csa_backend: INFO

google:
  oauth:
    client-id: ""

ai:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-sonnet-4-6
    base-url: https://api.anthropic.com
  dalle:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com
  elevenlabs:
    api-key: ${ELEVENLABS_API_KEY:}
    base-url: https://api.elevenlabs.io
    voice-ids:
      dad: ${ELEVENLABS_VOICE_DAD:}
      mom: ${ELEVENLABS_VOICE_MOM:}
      grandma: ${ELEVENLABS_VOICE_GRANDMA:}
      grandpa: ${ELEVENLABS_VOICE_GRANDPA:}

storage:
  mode: local
  local-base-path: C:/project/csa/generated-fairytales
  server-base-url: ${DEV_SERVER_BASE_URL:http://localhost:8080}
