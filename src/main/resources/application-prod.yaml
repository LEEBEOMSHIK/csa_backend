spring:
  datasource:
    url: jdbc:postgresql://prod-db-host:5432/mydatabase
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 86400000
  refresh-expiration: 604800000

server:
  port: 8080

logging:
  level:
    root: WARN
    org.example.csa_backend: INFO
