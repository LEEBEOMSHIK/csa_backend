services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=csa'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d csa"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - '8080:8080'
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/csa
      - SPRING_DOCKER_COMPOSE_LIFECYCLE-MANAGEMENT=none
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
